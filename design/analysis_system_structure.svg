<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">주식 분석 시스템 내부 구조</title>
  <desc id="desc">대시보드 앱은 최신 분석결과 조회 API를 호출하고, 분석 시스템은 저장소에 결과가 있으면 반환하며 없으면 금융 데이터 조회, 프롬프트 구성, AI 에이전트 분석, JSON 저장 후 결과를 반환한다.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27364a"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .boundary { fill: #eef4ff; stroke: #5477b8; stroke-width: 2; rx: 18; }
      .external { fill: #ffffff; stroke: #6b7280; stroke-width: 2; rx: 14; }
      .internal { fill: #ffffff; stroke: #2f5f9f; stroke-width: 2; rx: 14; }
      .decision { fill: #fffdf0; stroke: #b7791f; stroke-width: 2; }
      .store { fill: #fff8e8; stroke: #b7791f; stroke-width: 2; }
      .agent { fill: #f2fff6; stroke: #2f855a; stroke-width: 2; rx: 14; }
      .title { fill: #152238; font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; font-size: 28px; font-weight: 700; }
      .label { fill: #172033; font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; font-size: 20px; font-weight: 700; }
      .small { fill: #4b5563; font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; font-size: 14px; }
      .edge { stroke: #27364a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .edgeText { fill: #26364d; font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; font-size: 14px; font-weight: 600; }
      .note { fill: #344054; font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif; font-size: 16px; font-weight: 600; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="720"/>
  <text class="title" x="52" y="58">주식 분석 시스템 내부 구조</text>
  <text class="note" x="54" y="88">기본 흐름은 최신 분석결과 조회이며, 저장된 분석결과가 없을 때만 내부 분석을 실행한다.</text>

  <rect class="external" x="54" y="168" width="218" height="90"/>
  <text class="label" x="108" y="204">대시보드 앱</text>
  <text class="small" x="85" y="231">관심종목 최신 분석결과 조회</text>

  <rect class="boundary" x="322" y="112" width="650" height="520"/>
  <text class="label" x="570" y="150">주식 분석 시스템</text>

  <rect class="internal" x="370" y="188" width="206" height="78"/>
  <text class="label" x="415" y="221">분석결과 API</text>
  <text class="small" x="394" y="246">최신 분석결과 조회</text>

  <polygon class="decision" points="704,170 820,230 704,290 588,230"/>
  <text class="label" x="657" y="224">분석결과</text>
  <text class="label" x="676" y="249">존재?</text>

  <rect class="internal" x="400" y="344" width="190" height="78"/>
  <text class="label" x="444" y="377">금융 데이터 조회</text>
  <text class="small" x="428" y="402">차트 / OHLCV / 지표</text>

  <rect class="internal" x="664" y="344" width="190" height="78"/>
  <text class="label" x="701" y="377">프롬프트 구성</text>
  <text class="small" x="688" y="402">시스템 프롬프트 + 데이터</text>

  <rect class="agent" x="400" y="500" width="190" height="86"/>
  <text class="label" x="443" y="534">AI 에이전트</text>
  <text class="small" x="428" y="559">분석 / 브리핑 생성</text>

  <rect class="internal" x="664" y="502" width="190" height="82"/>
  <text class="label" x="709" y="535">JSON 저장</text>
  <text class="small" x="690" y="560">분석결과 구조화</text>

  <path class="store" d="M1044 344 C1044 320,1194 320,1194 344 L1194 456 C1194 480,1044 480,1044 456 Z"/>
  <ellipse class="store" cx="1119" cy="344" rx="75" ry="24"/>
  <text class="label" x="1063" y="393">분석 결과 저장소</text>
  <text class="small" x="1073" y="419">JSON 분석 결과</text>

  <rect class="external" x="1026" y="520" width="212" height="86"/>
  <text class="label" x="1057" y="555">금융 데이터 제공</text>
  <text class="small" x="1076" y="580">주가 / 거래량 / 지표</text>

  <path class="edge" d="M272 213 L370 213"/>
  <text class="edgeText" x="286" y="198">최신 분석결과 조회</text>

  <path class="edge" d="M576 225 L589 225"/>

  <path class="edge" d="M705 170 C720 116,1080 118,1118 320"/>
  <text class="edgeText" x="846" y="126">있음: 저장된 결과 조회</text>

  <path class="edge" d="M1044 376 C872 318,640 300,576 246"/>
  <text class="edgeText" x="760" y="310">최신 결과 반환</text>

  <path class="edge" d="M588 230 C468 244,410 286,445 344"/>
  <text class="edgeText" x="431" y="292">없음: 내부 분석 시작</text>

  <path class="edge" d="M590 383 L664 383"/>
  <text class="edgeText" x="603" y="368">데이터 전달</text>

  <path class="edge" d="M854 383 C956 420,1038 466,1088 520"/>
  <text class="edgeText" x="928" y="452">금융 데이터 요청</text>

  <path class="edge" d="M1026 554 C898 548,812 494,759 422"/>
  <text class="edgeText" x="846" y="536">금융 데이터 응답</text>

  <path class="edge" d="M664 412 C602 448,554 474,512 500"/>
  <text class="edgeText" x="562" y="464">프롬프트 전달</text>

  <path class="edge" d="M590 543 L664 543"/>
  <text class="edgeText" x="606" y="528">분석결과</text>

  <path class="edge" d="M854 543 C952 522,1035 480,1088 456"/>
  <text class="edgeText" x="932" y="514">JSON 저장</text>

  <path class="edge" d="M664 570 C500 642,320 584,272 236"/>
  <text class="edgeText" x="384" y="636">새 분석결과 응답</text>
</svg>
