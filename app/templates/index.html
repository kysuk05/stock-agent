<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stock Agent</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        background: #f6f7f9;
        color: #1c2733;
      }

      main {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 20px;
      }

      form {
        display: flex;
        gap: 8px;
        margin: 20px 0;
      }

      input,
      button {
        border: 1px solid #ccd3dd;
        border-radius: 6px;
        font: inherit;
        padding: 10px 12px;
      }

      input {
        flex: 1;
        min-width: 0;
      }

      button {
        background: #1f6feb;
        border-color: #1f6feb;
        color: white;
        cursor: pointer;
      }

      button.secondary {
        background: white;
        border-color: #ccd3dd;
        color: #1c2733;
      }

      button.history-item {
        width: 100%;
        text-align: left;
        background: white;
        border-color: #d7dde5;
        color: #1c2733;
        margin-bottom: 8px;
      }

      button.history-item.active {
        border-color: #1f6feb;
        background: #eef4ff;
      }

      pre {
        min-height: 160px;
        overflow: auto;
        border: 1px solid #d7dde5;
        border-radius: 6px;
        background: white;
        padding: 16px;
        white-space: pre-wrap;
      }

      .section-title {
        margin: 28px 0 12px;
        font-size: 1.1rem;
      }

      .meta {
        color: #5b6775;
        font-size: 0.92rem;
        margin-bottom: 12px;
      }

      #history-list {
        margin-bottom: 20px;
      }

      .empty-history {
        color: #5b6775;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>분석 결과</h1>
      <p class="meta">스케줄러가 저장한 이전 분석을 조회합니다. 저장된 결과가 없을 때만 즉시 분석합니다.</p>
      <form id="lookup-form">
        <input id="symbol" name="symbol" value="{{ default_symbol }}" aria-label="Stock symbol">
        <button type="submit">조회</button>
      </form>
      <h2 class="section-title">최신 분석</h2>
      <pre id="result" aria-live="polite">종목을 입력하고 조회하세요.</pre>
      <h2 class="section-title">이전 분석 이력</h2>
      <div id="history-list" class="empty-history">이력이 없습니다.</div>
    </main>
    <script>
      const form = document.querySelector("#lookup-form");
      const result = document.querySelector("#result");
      const historyList = document.querySelector("#history-list");
      let activeResultId = null;

      function formatKst(isoString) {
        if (!isoString) return "-";
        return new Date(isoString).toLocaleString("ko-KR", { timeZone: "Asia/Seoul" });
      }

      function renderDetail(body, label) {
        const lines = [
          `[${label}]`,
          body.should_alert ? "카카오 알림: 전송 시도됨 (나와의 채팅 확인)" : "카카오 알림: 조건 미충족",
          `분석 시각: ${formatKst(body.analyzed_at)}`,
          "",
          JSON.stringify(body, null, 2),
        ];
        result.textContent = lines.join("\n");
      }

      function renderHistory(items) {
        if (!items.length) {
          historyList.className = "empty-history";
          historyList.textContent = "저장된 분석 이력이 없습니다. 스케줄러 실행 후 다시 조회하세요.";
          return;
        }

        historyList.className = "";
        historyList.innerHTML = "";
        for (const item of items) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "history-item";
          if (item.id === activeResultId) {
            button.classList.add("active");
          }
          button.textContent = `${formatKst(item.analyzed_at)} · ${item.overall_judgment} · ${item.summary}`;
          button.addEventListener("click", async () => {
            const symbol = document.querySelector("#symbol").value.trim() || "005930.KS";
            activeResultId = item.id;
            renderHistory(items);
            result.textContent = "이력 상세 불러오는 중...";
            try {
              const response = await fetch(
                `/stocks/${encodeURIComponent(symbol)}/analysis/${item.id}`
              );
              const body = await response.json();
              if (!response.ok) {
                result.textContent = `Error ${response.status}: ${body.detail || JSON.stringify(body)}`;
                return;
              }
              renderDetail(body, `이력 #${item.id}`);
            } catch (error) {
              result.textContent = `이력 조회 실패: ${error}`;
            }
          });
          historyList.appendChild(button);
        }
      }

      async function lookupSymbol(symbol) {
        result.textContent = "불러오는 중...";
        historyList.className = "empty-history";
        historyList.textContent = "이력 불러오는 중...";
        activeResultId = null;

        try {
          const [latestResponse, historyResponse] = await Promise.all([
            fetch(`/stocks/${encodeURIComponent(symbol)}/analysis/latest`),
            fetch(`/stocks/${encodeURIComponent(symbol)}/analysis?limit=20`),
          ]);
          const latestBody = await latestResponse.json();
          const historyBody = await historyResponse.json();

          if (!latestResponse.ok) {
            result.textContent = `Error ${latestResponse.status}: ${latestBody.detail || JSON.stringify(latestBody)}`;
            historyList.textContent = "이력을 불러오지 못했습니다.";
            return;
          }
          if (!historyResponse.ok) {
            renderDetail(latestBody, "최신");
            historyList.textContent = `이력 조회 실패: ${historyBody.detail || JSON.stringify(historyBody)}`;
            return;
          }

          activeResultId = latestBody.id;
          renderDetail(latestBody, "최신");
          renderHistory(historyBody);
        } catch (error) {
          result.textContent = `조회 실패: ${error}`;
          historyList.textContent = "이력을 불러오지 못했습니다.";
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const symbol = document.querySelector("#symbol").value.trim() || "005930.KS";
        await lookupSymbol(symbol);
      });

      lookupSymbol(document.querySelector("#symbol").value.trim() || "005930.KS");
    </script>
  </body>
</html>
