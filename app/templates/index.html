<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stock Agent</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        margin: 0;
        background: #f6f7f9;
        color: #1c2733;
      }

      main {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 20px;
      }

      form {
        display: flex;
        gap: 8px;
        margin: 20px 0;
      }

      input,
      button {
        border: 1px solid #ccd3dd;
        border-radius: 6px;
        font: inherit;
        padding: 10px 12px;
      }

      input {
        flex: 1;
        min-width: 0;
      }

      button {
        background: #1f6feb;
        border-color: #1f6feb;
        color: white;
        cursor: pointer;
      }

      pre {
        min-height: 160px;
        overflow: auto;
        border: 1px solid #d7dde5;
        border-radius: 6px;
        background: white;
        padding: 16px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Latest Analysis</h1>
      <form id="lookup-form">
        <input id="symbol" name="symbol" value="{{ default_symbol }}" aria-label="Stock symbol">
        <button type="submit">Lookup</button>
      </form>
      <pre id="result" aria-live="polite">Enter a symbol and run lookup.</pre>
    </main>
    <script>
      const form = document.querySelector("#lookup-form");
      const result = document.querySelector("#result");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const symbol = document.querySelector("#symbol").value.trim() || "005930.KS";
        result.textContent = "Loading...";

        try {
          const response = await fetch(`/stocks/${encodeURIComponent(symbol)}/analysis/latest`);
          const body = await response.json();
          if (!response.ok) {
            result.textContent = `Error ${response.status}: ${body.detail || JSON.stringify(body)}`;
            return;
          }
          const lines = [
            body.should_alert ? "카카오 알림: 전송 시도됨 (나와의 채팅 확인)" : "카카오 알림: 조건 미충족",
            "",
            JSON.stringify(body, null, 2),
          ];
          result.textContent = lines.join("\n");
        } catch (error) {
          result.textContent = `Lookup failed: ${error}`;
        }
      });
    </script>
  </body>
</html>
